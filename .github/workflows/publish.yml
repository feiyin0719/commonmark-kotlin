name: Publish to Maven Central

on:
  release:
    types: [created]

jobs:
  publish:
    runs-on: macos-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION"

      - name: Decode GPG key
        run: echo "${{ secrets.GPG_SIGNING_KEY }}" | base64 --decode > /tmp/secring.asc

      - name: Lint check
        run: ./gradlew ktlintCheck --no-configuration-cache

      - name: Run tests
        run: ./gradlew jvmTest --no-configuration-cache

      - name: Build and sign all artifacts
        run: |
          export ORG_GRADLE_PROJECT_signingInMemoryKey=$(cat /tmp/secring.asc)
          ./gradlew publishToMavenLocal \
            -PVERSION_NAME=${{ steps.version.outputs.version }} \
            --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_SIGNING_PASSWORD }}

      - name: Generate checksums and create bundle
        run: |
          REPO_DIR="$HOME/.m2/repository"
          GROUP_DIR="$REPO_DIR/io/github/feiyin0719"

          echo "=== Removing local-only metadata ==="
          find "$GROUP_DIR" -name "maven-metadata-local.xml" -delete

          echo "=== Generating md5 and sha1 checksums ==="
          find "$GROUP_DIR" -type f \
            ! -name "*.md5" ! -name "*.sha1" ! -name "*.sha256" ! -name "*.sha512" \
            | while read -r file; do
              md5 -q "$file" > "$file.md5"
              shasum -a 1 "$file" | cut -d' ' -f1 > "$file.sha1"
            done

          echo "=== Creating deployment bundle ==="
          cd "$REPO_DIR"
          zip -r /tmp/central-bundle.zip io/github/feiyin0719/
          BUNDLE_SIZE=$(du -h /tmp/central-bundle.zip | cut -f1)
          echo "Bundle size: $BUNDLE_SIZE"

      - name: Upload bundle to Central Portal
        run: |
          echo "=== Uploading to Central Portal ==="
          RESPONSE=$(curl --max-time 600 --retry 3 --retry-delay 10 \
            -X POST \
            -u "${{ secrets.SONATYPE_USERNAME }}:${{ secrets.SONATYPE_PASSWORD }}" \
            -F "bundle=@/tmp/central-bundle.zip" \
            -s -w "\n%{http_code}" \
            "https://central.sonatype.com/api/v1/publisher/upload?publishingType=AUTOMATIC")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "Upload successful! Deployment ID: $BODY"
          else
            echo "Upload failed!"
            exit 1
          fi

      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            **/build/reports/
            **/build/logs/
